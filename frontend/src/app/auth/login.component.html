<div class="auth-page">
  <div class="auth-card">

    <!-- Logo mark -->
    <div class="auth-logo">
      <div class="logo-mark">
        <mat-icon>hub</mat-icon>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Connect your Ethereum wallet to continue</p>

    <!-- MetaMask connect box -->
    <button
      class="connect-box"
      (click)="onConnect()"
      [disabled]="loading"
    >
      <div class="connect-icon">
        <mat-icon>account_balance_wallet</mat-icon>
      </div>
      <div class="connect-text">
        <span class="connect-label">Connect with MetaMask</span>
        <span class="connect-hint">Sign a message to verify ownership</span>
      </div>
      <div class="connect-arrow">
        <mat-icon *ngIf="!loading">chevron_right</mat-icon>
        <mat-progress-spinner *ngIf="loading" diameter="18" mode="indeterminate"></mat-progress-spinner>
      </div>
    </button>

    <!-- Blockchain feedback -->
    <app-tx-feedback
      [state]="feedbackState"
      [message]="feedbackMessage"
    ></app-tx-feedback>

    <!-- Divider -->
    <div class="auth-divider">
      <div class="divider-line"></div>
      <span class="divider-label">New to BlockFin?</span>
      <div class="divider-line"></div>
    </div>

    <!-- Register CTA -->
    <a routerLink="/register" class="register-cta">
      Create an account →
    </a>

    <!-- Security note -->
    <div class="security-note">
      <mat-icon>lock</mat-icon>
      <span>No password stored — secured by cryptographic signature</span>
    </div>

  </div>
</div>
