name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/backend.sln

      - name: Build
        run: dotnet build backend/backend.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test backend/backend.sln --no-build --configuration Release --verbosity normal
        env:
          ASPNETCORE_ENVIRONMENT: Test

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build production
        run: cd frontend && npm run build -- --configuration production

  contracts:
    name: Contracts — Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd contracts && npm install

      - name: Compile contracts
        run: cd contracts && npx truffle compile
